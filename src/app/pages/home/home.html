<section
  class="hero"
  id="inicio"
  #heroRoot
  aria-labelledby="hero-heading"
>
  <div class="hero__viewport" aria-hidden="true">
    <div class="hero__media">
      <img
        class="hero__img"
        src="/images/hero-cake.png"
        alt=""
        width="1600"
        height="900"
        decoding="async"
        fetchpriority="high"
      />
    </div>
  </div>

  <div class="hero__shade" aria-hidden="true"></div>

  <div class="hero__blur hero__blur--top" aria-hidden="true"></div>
  <div class="hero__blur hero__blur--bottom" aria-hidden="true"></div>

  <div class="hero__inner" #heroInner>
    <p class="hero__eyebrow">Doce Encanto Ateliê</p>
    <h1 class="hero__title" id="hero-heading">
      Descubra o sabor<br />
      do seu momento especial
    </h1>
    <p class="hero__lead">
      Bolos artesanais sob encomenda, feitos com ingredientes selecionados e o cuidado de quem ama
      transformar ocasiões em memórias doces.
    </p>
    <div class="hero__actions">
      <a class="hero__btn hero__btn--primary" [href]="whatsappHref" target="_blank" rel="noopener noreferrer">
        Encomendar
      </a>
      <a class="hero__btn hero__btn--ghost" routerLink="/produtos">Ver bolos</a>
    </div>
  </div>
</section>

<app-categories />
<app-best-sellers></app-best-sellers>
<app-avaliacoes></app-avaliacoes>

<!-- Nova seção de Localização exigida integrada diretamente no layout, conforme as restrições sem novos arquivos TS -->
<section
  class="location-section"
  id="localizacao"
  style="padding: 60px 20px; background-color: #faf7f2; text-align: center; font-family: var(--font-sans);"
>
  <div class="container" style="max-width: 1200px; margin: 0 auto;">
    <h2 style="font-family: var(--font-serif); font-size: 2.5rem; color: #d4af37; margin-bottom: 40px;">
      Nossa Localização
    </h2>
    <div
      class="map-wrapper"
      style="width: 100%; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; transition: opacity 0.8s ease, transform 0.8s ease; opacity: 0; transform: translateY(20px);"
    >
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.485122557579!2d-46.6599187!3d-23.5581977!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce58332da757af%3A0xe5ebce8813a43bf!2sR.%20Augusta%2C%201500%20-%20Consola%C3%A7%C3%A3o%2C%20S%C3%A3o%20Paulo%20-%20SP!5e0!3m2!1spt-BR!2sbr!4v1700000000000!5m2!1spt-BR!2sbr" 
        width="100%" 
        height="450" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
    <p style="font-size: 1.1rem; color: #3d2c24; margin-top: 15px; font-weight: 500;">
      Rua Augusta, 1500 - Consolação, São Paulo - SP, Brazil
    </p>
  </div>
</section>

<app-faq></app-faq>
