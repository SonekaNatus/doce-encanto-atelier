<section class="faq-section" id="faq">
  <div class="faq-bg-watermark" aria-hidden="true">DOCE ENCANTO</div>
  
  <div class="faq-container">
    <h2 class="faq-title">Dúvidas Frequentes</h2>

    <div class="faq-grid">
      <!-- Coluna Esquerda -->
      <div class="faq-col">
        @for (item of faqsLeft; track item.question; let i = $index) {
          <div class="faq-item">
            <button class="faq-question" (click)="toggleFaqLeft(i)" [attr.aria-expanded]="item.open">
              <svg class="faq-chevron" [class.open]="item.open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>{{ item.question }}</span>
            </button>
            <div class="faq-answer-wrapper" [class.open]="item.open">
              <div class="faq-answer">
                {{ item.answer }}
              </div>
            </div>
          </div>
        }
      </div>
      
      <!-- Coluna Direita -->
      <div class="faq-col">
        @for (item of faqsRight; track item.question; let i = $index) {
          <div class="faq-item">
            <button class="faq-question" (click)="toggleFaqRight(i)" [attr.aria-expanded]="item.open">
              <svg class="faq-chevron" [class.open]="item.open" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>{{ item.question }}</span>
            </button>
            <div class="faq-answer-wrapper" [class.open]="item.open">
              <div class="faq-answer">
                {{ item.answer }}
              </div>
            </div>
          </div>
        }
      </div>
    </div>

    <div class="faq-footer">
      <p class="faq-footer-text">Ainda em dúvida?</p>
      <a [href]="whatsappHref" class="faq-whatsapp-btn" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.125-.339-.153-.873-.341-1.642-.969-1.229-.997-2.072-2.34-2.316-2.671-.244-.329-.582-.93-.585-1.536-.003-.604.301-.899.414-1.018.109-.115.263-.162.405-.165.132-.003.248.001.353.001.125 0 .285-.045.429.305.151.365.518 1.266.564 1.359.045.093.078.204.015.333-.061.129-.093.21-.186.315-.093.107-.197.234-.277.318-.091.096-.188.199-.082.383.106.182.472.775 1.011 1.258.694.622 1.268.809 1.45.899.182.091.288.077.396-.046.108-.124.469-.545.594-.731.127-.186.252-.155.419-.093.167.062 1.056.498 1.238.589.182.091.303.136.347.214.045.078.045.45-.099.855zM12 2C6.477 2 2 6.477 2 12c0 1.763.456 3.424 1.269 4.881L2 22l5.305-1.191A9.946 9.946 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
        FALE CONOSCO AGORA
      </a>
    </div>
  </div>
</section>
