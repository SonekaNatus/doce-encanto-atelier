<section class="bs-section" id="mais-vendidos">
  <div class="bs-container">
    <div class="bs-header">
      <h2 class="bs-title">Mais Vendidos</h2>
      <p class="bs-subtitle">Os queridinhos dos nossos clientes</p>
    </div>

    <div class="bs-grid">
      @for (product of products; track product.name) {
        <div class="bs-card">
          <div class="bs-img-placeholder">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8" />
              <path d="M4 16s.5-1 2-1 2.5 2 4 2 2.5-2 4-2 2.5 2 4 2 2-1 2-1" />
              <path d="M2 21h20" />
              <path d="M7 8v3" />
              <path d="M12 8v3" />
              <path d="M17 8v3" />
              <path d="M7 4h.01" />
              <path d="M12 4h.01" />
              <path d="M17 4h.01" />
            </svg>
            <span>Foto em breve</span>
          </div>
          <div class="bs-card-content">
            <h3 class="bs-name">{{ product.name }}</h3>
            <p class="bs-desc">{{ product.description }}</p>
            <div class="bs-price">{{ product.price }}</div>
            <a class="bs-btn" routerLink="/cardapio" [queryParams]="{ bolo: product.name }">Encomendar</a>
          </div>
        </div>
      }
    </div>
  </div>
</section>
